<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Engineering Status Assistant{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/">Engineering Status Assistant</a>
    <nav class="site-nav">
      <a href="/">Repositories</a>
      <a href="/engineers">Engineers</a>
      <a href="/reviews">Reviews</a>
      <a href="/whats-happened">Since last scrum</a>
    </nav>
    <form class="site-sync" method="post" action="/sync">
      <button type="submit" class="btn">Sync all</button>
    </form>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
