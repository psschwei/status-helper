apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-assistant
  namespace: status-assistant
  labels:
    app.kubernetes.io/name: status-assistant
spec:
  # Single replica: SQLite is a single-writer store on a ReadWriteOnce volume.
  replicas: 1
  # Recreate (not RollingUpdate) so the old pod releases the RWO volume before the new
  # one starts — two pods can't mount it at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: status-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: status-assistant
    spec:
      securityContext:
        # Match the non-root `app` user baked into the image; fsGroup makes the mounted
        # PVC group-writable so the process can create /data/status.db.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: status-assistant
          # Replace with your pushed image reference.
          image: ghcr.io/your-org/status-assistant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            # Non-secret settings + config-file paths.
            - configMapRef:
                name: status-assistant-config
            # GITHUB_TOKEN and (optional) LLM_API_KEY.
            - secretRef:
                name: status-assistant-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
            # Writable scratch space, since the root filesystem is read-only.
            - name: tmp
              mountPath: /tmp
          # `/` renders the dashboard — a cheap, dependency-light page — so it doubles as
          # a health signal. Startup probe covers first-boot table creation / cold start.
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: status-assistant-data
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: status-assistant-config
            # Only the TOML files land in /config; the env-var keys in the same ConfigMap
            # are consumed via envFrom and don't need to appear as files.
            items:
              - key: repos.toml
                path: repos.toml
              - key: engineers.toml
                path: engineers.toml
              - key: scrum.toml
                path: scrum.toml
