# TEMPLATE — do NOT commit a filled-in copy. Copy to secret.yaml (gitignored),
# set real values, and `kubectl apply -f secret.yaml`. Or create it imperatively:
#
#   kubectl -n status-assistant create secret generic status-assistant-secrets \
#     --from-literal=GITHUB_TOKEN=ghp_xxx \
#     --from-literal=LLM_API_KEY=sk-xxx
#
# These map to the app's Settings fields (GITHUB_TOKEN, LLM_API_KEY). LLM_API_KEY is
# optional — omit it to disable AI summaries (the UI shows a "not configured" hint).
apiVersion: v1
kind: Secret
metadata:
  name: status-assistant-secrets
  namespace: status-assistant
  labels:
    app.kubernetes.io/name: status-assistant
type: Opaque
stringData:
  GITHUB_TOKEN: "ghp_your_token_here"
  # Optional: remove this line to run without AI summaries.
  LLM_API_KEY: "sk-your_key_here"
